settings:
  locale: "tr"
  self_destruct:
    enabled: true
    duration_hours: 72
    scan:
      interval_ticks: 72000
      max_items_per_scan: 5000
      chunk_scan_on_load: true
  limits:
    tree:
      max_logs: 512
      max_leaves: 2048
      # Odun+yaprak BFS bağlı bileşen üst sınırı (dev ağaç/taç için artırılabilir)
      max_connected_blocks: 2560
      # false: gövde sadece yüz komşulukta birleşir (yan ağaçlar ayrı kalır, SMP için önerilir).
      # true: eski 26 komşu — köşeden değen aynı tür odunlar tek ağaç sayılır.
      logs_full_connectivity: false
    break3x3:
      max_blocks: 9

messages:
  prefix: "&8[&6ᴇꜰᴇᴋᴛ&8]&r "
  no_permission: "&cʏᴇᴛᴋɪɴ ʏᴏᴋ."
  player_not_found: "&cᴏʏᴜɴᴄᴜ ʙᴜʟᴜɴᴀᴍᴀᴅɪ."
  invalid_usage: "&cᴋᴜʟʟᴀɴɪᴍ: &7/ᴇꜰᴇᴋᴛ ɢɪᴠᴇ <ʙᴀʟᴛᴀ|ᴋᴀᴢᴍᴀ|ᴋᴜʀᴇᴋ|ᴄᴜʙᴜᴋ|ᴋᴏᴠᴀ> <ᴏʏᴜɴᴄᴜ> <ᴍɪᴋᴛᴀʀ>"
  amount_invalid: "&cᴍɪᴋᴛᴀʀ ɢᴇᴄᴇʀꜱɪᴢ."
  give_success: "&a%player% &aᴏʏᴜɴᴄᴜꜱᴜɴᴀ &e%amount%x %item% &aᴠᴇʀɪʟᴅɪ."
  received_item: "&a%amount%x &e%item% &aᴀʟᴅɪɴ."
  item_expired: "&cᴇꜰᴇᴋᴛ ᴇꜱʏᴀꜱɪɴɪɴ ꜱᴜʀᴇꜱɪ ᴅᴏʟᴅᴜ ᴠᴇ ꜱɪʟɪɴᴅɪ."
  sell:
    no_chest: "&cʙɪʀ ꜱᴀɴᴅɪɢᴀ ᴛɪᴋʟᴀᴍᴀʟɪꜱɪɴ."
    nothing_to_sell: "&eꜱᴀᴛɪʟᴀʙɪʟɪʀ ᴇꜱʏᴀ ʏᴏᴋ."
    sold: "&aꜱᴀɴᴅɪᴋᴛᴀᴋɪ ᴇꜱʏᴀʟᴀʀ &e%price% &aᴘᴀʀᴀʏᴀ ꜱᴀᴛɪʟᴅɪ."
    economy_missing: "&cᴇᴋᴏɴᴏᴍɪ ʙᴜʟᴜɴᴀᴍᴀᴅɪ (ᴠᴀᴜʟᴛ/ᴇᴄᴏ)."

